{{ define "main" }}
<article class="post">
  <header class="post-header">
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Monday, 02/01/2006" }}</time>
      {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
    <h1>{{ .Title }}</h1>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>

  <footer class="post-footer">
    <a href="{{ .Site.Home.RelPermalink }}" class="back-link">← Về trang chủ</a>
  </footer>
</article>
{{ end }}
